backend:
  name: github
  repo: kikishmoo/chinesezodiacyear.com
  branch: main

media_folder: "src/images"
public_folder: "/images"

collections:
  - name: "articles"
    label: "Articles"
    folder: "src/articles"
    create: true
    slug: "{{slug}}"
    extension: "njk"
    format: "frontmatter"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Category", name: "category", widget: "select", options: ["zodiac", "culture", "fengshui", "bazi", "business"] }
      - { label: "Category Label", name: "categoryLabel", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "Editorial Staff" }
      - { label: "Read Time", name: "readTime", widget: "string", default: "5 min read" }
      - { label: "Hero Overline", name: "heroOverline", widget: "string", required: false }
      - { label: "Hero Title", name: "heroTitle", widget: "string" }
      - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text", required: false }
      - { label: "Show Share Buttons", name: "showShareButtons", widget: "boolean", default: true }
      - { label: "OG Type", name: "ogType", widget: "hidden", default: "article" }
      - label: "Breadcrumbs"
        name: "breadcrumbs"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string", required: false }
      - label: "Table of Contents"
        name: "toc"
        widget: "list"
        required: false
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Label", name: "label", widget: "string" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - { label: "Question", name: "q", widget: "string" }
          - { label: "Answer", name: "a", widget: "text" }
      - label: "Related Articles"
        name: "relatedArticles"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Body", name: "body", widget: "code", default_language: "html", output_code_only: true }

  - name: "encyclopedia"
    label: "Encyclopedia Pages"
    folder: "src/pages"
    create: false
    slug: "{{slug}}"
    extension: "njk"
    format: "frontmatter"
    filter: { field: "category", value: "encyclopedia" }
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "layouts/article.njk" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Category", name: "category", widget: "hidden", default: "encyclopedia" }
      - { label: "OG Type", name: "ogType", widget: "hidden", default: "article" }
      - { label: "Permalink", name: "permalink", widget: "string" }
      - { label: "Hero Overline", name: "heroOverline", widget: "string" }
      - { label: "Hero Title", name: "heroTitle", widget: "string" }
      - { label: "Hero Subtitle", name: "heroSubtitle", widget: "text", required: false }
      - label: "Breadcrumbs"
        name: "breadcrumbs"
        widget: "list"
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string", required: false }
      - label: "Table of Contents"
        name: "toc"
        widget: "list"
        required: false
        fields:
          - { label: "ID", name: "id", widget: "string" }
          - { label: "Label", name: "label", widget: "string" }
      - label: "FAQ"
        name: "faq"
        widget: "list"
        required: false
        fields:
          - { label: "Question", name: "q", widget: "string" }
          - { label: "Answer", name: "a", widget: "text" }
      - label: "Related Articles"
        name: "relatedArticles"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Body", name: "body", widget: "code", default_language: "html", output_code_only: true }
